<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ipod music player</title>
</head>
<body>
    <div class="ipod">
        <div class="screen-shell">
            <div class="screen">
                <div class="view active" id="view-player">
                    <div class="np-header">NOW PLAYING</div>
                    <div class="np-track" id="np-track">-</div>
                    <div class="np-artist" id="np-artist"> no track loaded</div>
                    <div class="np-progress-wrap">
                        <div class="np-bar-bg"><div class="np-bar-fill"></div></div>
                        <div class="np-times">
                            <span id="np-cur">0:00</span>
                            <span id="np-dur">0:00</span>
                        </div>
                    </div>
                </div>
                <div class="view" id="view-menu">
                    <div class="menu-title">SONGS</div>
                    <div class="menu-list">
                        <div class="menu-items" id="menu-items">
                            <div class="menu-empty">add music</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="wheel-wrap">
            <div class="wheel">

                <button class="wheel-btn wb-menu" id="btn-menu">MENU</button>
                <button class="wheel-btn wb-play" id="btn-play">
                    <svg width="16" height="14" viewbox="0 0 16 14" fill="currentColor">
                        <rect x="0" y="1" width="4" height="12" rx="1"/>
                        <rect x="6" y="1" width="4" height="12" rx="1"/>
                    </svg>
                </button>
                <button class="wheel-btn wb-prev" id="btn-prev">
                    <svg width="16" height="14" viewbox="0 0 16 14" fill="currentColor">
                        <rect x="0" y="1" width="3" height="12" rx="1"/>
                        <polygon points="14,1,5,7,14,13"/>
                    </svg>
                </button>
                <button class="wheel-btn wb-next" id="btn-next">
                    <svg width="16" height="14" viewbox="0 0 16 14" fill="currentColor">
                        <rect x="13" y="1" width="3" height="12" rx="1"/>
                        <polygon points="2,1,11,7,2,13"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>
</body>
</html>
